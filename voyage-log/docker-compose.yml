services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: voyagelog
      POSTGRES_USER: voyagelog
      POSTGRES_PASSWORD: voyagelog
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  app:
    build: .
    depends_on:
      - db
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/voyagelog
      DB_USER: voyagelog
      DB_PASSWORD: voyagelog
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      PUBLIC_BASE_URL: https://voyage.gatto-piccolo.com
    ports:
      - "8082:8080"

volumes:
  pgdata:
