# nginx server block for voyage.gatto-piccolo.com
# Serves the Angular build as static files and reverse-proxies API +
# Telegram webhook traffic to the voyage-log Spring Boot process.
#
# Install:
#   sudo cp voyage.gatto-piccolo.com.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/voyage.gatto-piccolo.com.conf \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Run certbot AFTER this file is enabled with just the :80 block active
# (comment out the :443 block on first run if certbot --nginx complains
# about a missing certificate) — same order as was needed for the other
# vhosts on this box.

server {
    listen 80;
    listen [::]:80;
    server_name voyage.gatto-piccolo.com;

    # certbot uses this for the ACME HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name voyage.gatto-piccolo.com;

    ssl_certificate     /etc/letsencrypt/live/voyage.gatto-piccolo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voyage.gatto-piccolo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/voyage-web/browser;
    index index.html;

    # Angular SPA: fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /telegram/webhook {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Telegram's secret-token header must reach the app unmangled —
        # WebhookController checks it against TELEGRAM_WEBHOOK_SECRET.
        proxy_set_header X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
